<!DOCTYPE html>
<html>
<head>
    <title>Research Paper Simplifier</title>
</head>
<body>

    <h1>Research Paper Simplifier</h1>

    <p>Upload a research paper and get a summary.</p>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <input type="file" name="pdf" accept=".pdf" required>

        <button type="submit">
            Upload PDF
        </button>

    </form>

</body>
</html>
